windowrule = float class:^(pavucontrol)$
windowrule = float class:^(blueman-manager)$

 windowrule = opacity 0.92 : class:^(Rofi)$
windowrule = opacity 0.92 : class:^(wlogout)$
windowrule = opacity 0.85 : class:^(Pavucontrol)$
windowrule = opacity 0.88 : class:^(blueman-manager)$

# Terminal immer leicht transparent
windowrule = opacity 0.90 : class:^(Alacritty)$


# Conky unter Wayland als XWayland-Client
windowrule = no_anim : class:^(conky)$
windowrule = opacity 0.90 : class:^(conky)$
windowrule = no_focus : class:^(conky)$
# windowrulev2 = nofullscreenrequest,class:^(conky)$
windowrule = no_shadow : class:^(conky)$
