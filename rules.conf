# windowrulev2 = layerrule background,class:^(conky)$
# windowrule = float,class:^(conky)$


# Conky: unterster Layer, keine Interaktionsprobleme
windowrule = no_focus : class:^(conky)$
windowrule = no_anim : class:^(conky)$
windowrule = no_shadow : class:^(conky)$
